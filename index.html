<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store Outstanding Live Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background-color: #f7f9fa; color: #333; }
    .report-panel { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
    .row { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end; }
    label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 6px; }
    select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: #fff; }
    
    .btn-group { display: none; gap: 10px; width: 100%; height: 38px; }
    .download-btn { background-color: #1e7e34; color: white; border: none; padding: 0 15px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; flex: 1; height: 100%; }
    .download-btn:hover { background-color: #155d27; }
    
    .screenshot-btn { background-color: #007bff; color: white; border: none; padding: 0 15px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; flex: 1; height: 100%; }
    .screenshot-btn:hover { background-color: #0056b3; }
    
    .last-updated { font-size: 13px; color: #5f6368; font-style: italic; margin-bottom: 15px; font-weight: 500; }
    
    #captureArea { padding: 10px 0; background: white; transition: filter 0.3s ease; }
    
    .report-table { width: 100%; border-collapse: collapse; font-size: 14px; table-layout: auto; margin-bottom: 15px; }
    .report-table th, .report-table td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; vertical-align: middle; background-color: #fff; }
    
    .report-table td:nth-child(1) { white-space: normal; word-wrap: break-word; word-break: break-word; }
    .report-table td:nth-child(2), .report-table td:nth-child(3) { white-space: nowrap; }

    .header-row { background-color: #fff; font-weight: bold; text-align: center; }
    .header-row td { color: #c2185b; font-size: 16px; text-align: center; font-weight: bold; }
    
    .section-title td { background-color: #78909c !important; color: white !important; font-weight: bold !important; text-align: center !important; text-transform: uppercase; letter-spacing: 0.5px; font-size: 14px; padding: 10px 12px; border: 1px solid #78909c !important; }
    .highlight-title { background-color: #78909c; color: white; font-weight: bold; text-align: center !important; text-transform: uppercase; letter-spacing: 1px; }
    
    .grand-total td { background-color: #d1e7dd !important; font-weight: bold !important; }
    .purple-cell td, td.purple-cell { background-color: #d1c4e9 !important; font-weight: bold !important; }
    .yellow-cell td, td.yellow-cell { background-color: #fff9c4 !important; font-weight: bold !important; }
    .bold-row td { font-weight: bold !important; }
    .num { text-align: right; white-space: nowrap; }
    
    /* ⚡ 3D MOBILE ELECTRIC MATRIX LOADING ANIMATION ⚡ */
    #loadingWrapper {
      display: none;
      position: absolute;
      top: 55%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      perspective: 300px; /* 3D Depth Perspective like mobile image */
    }
    
    .electric-container {
      width: 120px;
      height: 120px;
      position: relative;
      transform-style: preserve-3d;
      margin: 0 auto 20px auto;
    }
    
    /* Creating the Glowing Perspective Electric Rings */
    .neon-ring {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 3px dotted #00f2fe;
      border-radius: 50%;
      box-shadow: 0 0 15px #00f2fe, inset 0 0 15px #00f2fe;
      animation: tunnelMove 2s linear infinite;
      opacity: 0;
    }
    
    .neon-ring:nth-child(2) { animation-delay: 0.5s; border-color: #4facfe; box-shadow: 0 0 15px #4facfe, inset 0 0 15px #4facfe; }
    .neon-ring:nth-child(3) { animation-delay: 1s; border-color: #007bff; box-shadow: 0 0 15px #007bff, inset 0 0 15px #007bff; }
    .neon-ring:nth-child(4) { animation-delay: 1.5s; border-color: #6610f2; box-shadow: 0 0 15px #6610f2, inset 0 0 15px #6610f2; }
    
    /* Center Core Light */
    .electric-core {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 20px 5px #00f2fe;
      z-index: 10;
    }

    .loading-text {
      font-weight: bold;
      font-size: 14px;
      color: #007bff;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
      margin-top: 10px;
      text-align: center;
    }

    /* Infinite 3D Tunnel Motion Keyframes */
    @keyframes tunnelMove {
      0% {
        transform: translateZ(-200px) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        transform: translateZ(100px) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="report-panel">
    <h2>Store Outstanding Live Dashboard</h2>
    <div id="updateTimeText" class="last-updated">Initializing...</div>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">
    
    <div class="row" style="max-width: 750px;">
      <div style="flex: 2;" id="dropdownWrapper">
        <label for="storeDropdown">Select Store Name / Branch:</label>
        <select id="storeDropdown" onchange="loadStoreReport()">
          <option value="">-- Loading Stores... --</option>
        </select>
      </div>
      <div style="flex: 2;" id="btnWrapper">
        <label>&nbsp;</label>
        <div id="btnGroup" class="btn-group">
          <button id="downloadBtn" class="download-btn" onclick="downloadCSV()">Download Excel</button>
          <button id="screenshotBtn" class="screenshot-btn" onclick="copyTableScreenshot()">Copy Screenshot</button>
        </div>
      </div>
    </div>
    
    <div id="loadingWrapper">
      <div class="electric-container">
        <div class="electric-core"></div>
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
        <div class="neon-ring"></div>
      </div>
      <div class="loading-text">⚡ FETCHING LIVE MATRIX ⚡</div>
    </div>
    
    <div id="captureArea">
      <div id="reportContainer"></div>
    </div>
  </div>

  <script>
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4RdQzfpHy2DvEOnjFPEsGjSVEj98jVHqzuqQPGqvcDt1KvRQNejygdppcMUN6nwk9CQ/exec"; 
    
    var currentReportData = null;
    var allowedBranch = "";
    var selectedStoreGlobal = "";

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      allowedBranch = urlParams.get('branch') || "";

      var cachedStores = localStorage.getItem('cached_store_names');
      if (cachedStores) {
        populateDropdown(JSON.parse(cachedStores));
      }

      if (allowedBranch) {
        document.getElementById("dropdownWrapper").style.display = "none";
        fetchReportData(allowedBranch);
      } else {
        fetchStoreNames();
      }
    };

    function jsonpRequest(url, callbackName) {
      var oldScript = document.getElementById('jsonp_script_' + callbackName);
      if (oldScript) oldScript.parentNode.removeChild(oldScript);
      
      var script = document.createElement('script');
      script.id = 'jsonp_script_' + callbackName;
      script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
      document.body.appendChild(script);
    }

    function fetchStoreNames() {
      jsonpRequest(`${APPS_SCRIPT_URL}?action=getStoreNames`, 'handleStoreNames');
    }

    function handleStoreNames(stores) {
      if(stores && !stores.error) {
        localStorage.setItem('cached_store_names', JSON.stringify(stores));
        populateDropdown(stores);
      }
    }

    function populateDropdown(stores) {
      var dropdown = document.getElementById("storeDropdown");
      var currentVal = dropdown.value;
      dropdown.innerHTML = '<option value="">-- Choose a Store --</option>';
      stores.forEach(store => {
        var op = document.createElement("option");
        op.value = store; op.text = store; dropdown.appendChild(op);
      });
      if(currentVal) dropdown.value = currentVal;
      document.getElementById("updateTimeText").innerText = "Ready";
    }

    function loadStoreReport() {
      var store = document.getElementById("storeDropdown").value;
      if(!store) {
        document.getElementById("reportContainer").innerHTML = "";
        document.getElementById("btnGroup").style.display = "none";
        return;
      }
      fetchReportData(store);
    }

    function fetchReportData(store) {
      selectedStoreGlobal = store;
      var loader = document.getElementById("loadingWrapper");
      var targetArea = document.getElementById("captureArea");
      
      loader.style.display = "block";
      targetArea.style.filter = "blur(8px)";
      targetArea.style.pointerEvents = "none";
      targetArea.style.opacity = "0.3";

      var cacheKey = 'cache_report_' + store.toUpperCase();
      var cachedReport = localStorage.getItem(cacheKey);
      
      if(cachedReport && !document.getElementById("reportTable")) {
        renderHTML(JSON.parse(cachedReport), store);
        targetArea.style.filter = "blur(8px)";
      }

      jsonpRequest(`${APPS_SCRIPT_URL}?action=getReport&branch=${encodeURIComponent(store)}`, 'handleReportData');
    }

    function handleReportData(data) {
      var loader = document.getElementById("loadingWrapper");
      var targetArea = document.getElementById("captureArea");
      
      loader.style.display = "none";
      
      if(data && !data.error) {
        var cacheKey = 'cache_report_' + selectedStoreGlobal.toUpperCase();
        localStorage.setItem(cacheKey, JSON.stringify(data));
        
        renderHTML(data, selectedStoreGlobal);
        
        targetArea.style.filter = "none";
        targetArea.style.pointerEvents = "auto";
        targetArea.style.opacity = "1";
      }
    }

    function renderHTML(data, store) {
      if(data.lastUpdated) {
        document.getElementById("updateTimeText").innerText = data.lastUpdated;
      }
      currentReportData = data;
      document.getElementById("btnGroup").style.display = "flex"; 
      
      var html = "";
      
      html += `<table class="report-table">`;
      html += `<tr class="header-row"><td colspan="2">STORE NAME-</td><td colspan="3">${store.toUpperCase()}</td></tr>`;
      html += `</table>`;

      var dInvTotal = 0, dOsTotal = 0;
      data.debtor.forEach(r => {
        dInvTotal += Number(r[3]) || 0; dOsTotal += Number(r[4]) || 0;
      });

      if (data.debtor.length > 0) {
        html += `<table class="report-table">`;
        html += `<tr><th style="width: 30%;">Debtor</th><th style="width: 15%;">Date</th><th style="width: 15%;">Invoice No.</th><th style="width: 20%;">Invoice Value</th><th style="width: 20%;">Actual OS Amt.</th></tr>`;
        data.debtor.forEach(r => {
          html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="num">${r[3]}</td><td class="num">${r[4]}</td></tr>`;
        });
        html += `<tr class="grand-total"><td colspan="3" style="text-align:center">GRAND TOTAL</td><td class="num">${dInvTotal}</td><td class="num">${dOsTotal}</td></tr>`;
        html += `</table>`;
      }

      var fInvTotal = 0, fOsTotal = 0;
      data.finance.forEach(r => {
        fInvTotal += Number(r[3]) || 0; fOsTotal += Number(r[4]) || 0;
      });

      if (data.finance.length > 0) {
        html += `<table class="report-table">`;
        html += `<tr class="section-title"><td colspan="5">FINANCE OUTSTANDING REPORT</td></tr>`;
        html += `<tr><th style="width: 30%;">Financier</th><th style="width: 15%;">Date</th><th style="width: 15%;">Invoice No.</th><th style="width: 20%;">Invoice Value</th><th style="width: 20%;">Actual OS Amt.</th></tr>`;
        data.finance.forEach(r => {
          html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="num">${r[3]}</td><td class="num">${r[4]}</td></tr>`;
        });
        html += `<tr class="grand-total"><td colspan="3" style="text-align:center">GRAND TOTAL</td><td class="num">${fInvTotal}</td><td class="num">${fOsTotal}</td></tr>`;
        html += `</table>`;
      }

      var grandFinalTotal = dOsTotal + fOsTotal + data.cash;
      html += `<table class="report-table" id="reportTable">`;
      html += `<tr class="section-title"><td colspan="5">OUTSTANDING</td></tr>`;
      html += `<tr class="bold-row"><td colspan="3" style="width: 60%;">CUSTOMER</td><td colspan="2" class="num" style="width: 40%;">${dOsTotal}</td></tr>`;
      html += `<tr class="bold-row"><td colspan="3">FINANCE</td><td colspan="2" class="num">${fOsTotal}</td></tr>`;
      html += `<tr class="purple-cell"><td colspan="3">CASH BALANCE</td><td colspan="2" class="num">${data.cash}</td></tr>`;
      html += `<tr class="yellow-cell"><td colspan="3">TOTAL</td><td colspan="2" class="num">${grandFinalTotal}</td></tr>`;
      html += `</table>`;
      
      document.getElementById("reportContainer").innerHTML = html;
    }

    function copyTableScreenshot() {
      var target = document.getElementById("captureArea");
      var btn = document.getElementById("screenshotBtn");
      btn.innerText = "Capturing...";
      btn.style.backgroundColor = "#ffc107";
      html2canvas(target, { scale: 2, useCORS: true }).then(canvas => {
        canvas.toBlob(blob => {
          if (navigator.clipboard && navigator.clipboard.write) {
            const item = new ClipboardItem({ "image/png": blob });
            navigator.clipboard.write([item]).then(() => {
              btn.innerText = "Copied! ✓";
              btn.style.backgroundColor = "#28a745";
              setTimeout(() => { resetBtn(btn); }, 2000);
            }).catch(err => { alert("Clipboard error."); resetBtn(btn); });
          } else { alert("Not supported."); resetBtn(btn); }
        });
      });
    }

    function resetBtn(btn) {
      btn.innerText = "Copy Screenshot";
      btn.style.backgroundColor = "#007bff";
    }

    function downloadCSV() {
      var store = allowedBranch || document.getElementById("storeDropdown").value;
      if (!store || !currentReportData) return;
      var data = currentReportData;
      var csvRows = [];
      csvRows.push(`"STORE NAME-","${store.toUpperCase()}","","",""`);
      csvRows.push(""); 
      var dInvTotal = 0, dOsTotal = 0;
      data.debtor.forEach(r => { dInvTotal += Number(r[3])||0; dOsTotal += Number(r[4])||0; });
      if(data.debtor.length > 0) {
        csvRows.push(`"Debtor","Date","Invoice No.","Invoice Value","Actual OS Amt."`);
        data.debtor.forEach(r => { csvRows.push(`"${r[0]}","${r[1]}","${r[2]}",${r[3]},${r[4]}`); });
        csvRows.push(`"GRAND TOTAL","","",${dInvTotal},${dOsTotal}`);
        csvRows.push(""); 
      }
      var fInvTotal = 0, fOsTotal = 0;
      data.finance.forEach(r => { fInvTotal += Number(r[3])||0; fOsTotal += Number(r[4])||0; });
      if(data.finance.length > 0) {
        csvRows.push(`"FINANCE OUTSTANDING REPORT","","","",""`);
        csvRows.push(`"Financier","Date","Invoice No.","Invoice Value","Actual OS Amt."`);
        data.finance.forEach(r => { csvRows.push(`"${r[0]}","${r[1]}","${r[2]}",${r[3]},${r[4]}`); });
        csvRows.push(`"GRAND TOTAL","","",${fInvTotal},${fOsTotal}`);
        csvRows.push(""); 
      }
      var grandFinalTotal = dOsTotal + fOsTotal + data.cash;
      csvRows.push(`"OUTSTANDING"`);
      csvRows.push(`"CUSTOMER","","",,${dOsTotal}`);
      csvRows.push(`"FINANCE","","",,${fOsTotal}`);
      csvRows.push(`"CASH BALANCE","","",,${data.cash}`);
      csvRows.push(`"TOTAL","","",,${grandFinalTotal}`);
      
      var csvContent = "\ufeff" + csvRows.join("\n"); 
      var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", store.toUpperCase() + "_Outstanding_Report.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
