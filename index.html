<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store Outstanding Live Dashboard</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; margin: 20px; background-color: #f4f6f8; color: #333; }
    .report-panel { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .row { display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end; }
    label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 6px; }
    select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background-color: #fff; }
    
    .download-btn { background-color: #1e7e34; color: white; border: none; padding: 10px 20px; font-size: 14px; font-weight: bold; border-radius: 4px; cursor: pointer; display: none; height: 38px; }
    .download-btn:hover { background-color: #155d27; }
    
    .last-updated { font-size: 13px; color: #5f6368; font-style: italic; margin-bottom: 15px; font-weight: 500; }
    
    .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; table-layout: auto; transition: filter 0.3s ease; }
    .report-table th, .report-table td { border: 1px solid #ddd; padding: 10px 8px; text-align: left; vertical-align: middle; }
    
    /* Jab data load ho raha hoga tab Table blur karne ke liye CSS class */
    .table-blur { filter: blur(5px); pointer-events: none; }
    
    .report-table td:nth-child(1) { white-space: normal; word-wrap: break-word; word-break: break-word; }
    .report-table th:nth-child(2), .report-table td:nth-child(2) { white-space: nowrap; width: 100px; min-width: 100px; text-align: center; }
    .report-table th:nth-child(3), .report-table td:nth-child(3) { white-space: nowrap !important; width: 110px; min-width: 110px; text-align: left; }
    .report-table th:nth-child(4), .report-table td:nth-child(4),
    .report-table th:nth-child(5), .report-table td:nth-child(5) { width: 110px; min-width: 110px; }

    .header-row { background-color: #fff; font-weight: bold; text-align: center; }
    .header-row td { color: #c2185b; font-size: 16px; text-align: center; }
    
    .section-title { background-color: #cfd8dc; font-weight: bold; text-align: center !important; text-transform: uppercase; letter-spacing: 0.5px; }
    .highlight-title { background-color: #78909c; color: white; font-weight: bold; text-align: center !important; text-transform: uppercase; letter-spacing: 1px; }
    
    .grand-total { background-color: #d1e7dd; font-weight: bold; }
    .blue-total { background-color: #64b5f6; font-weight: bold; }
    .purple-cell { background-color: #d1c4e9; font-weight: bold; }
    .yellow-cell { background-color: #fff9c4; font-weight: bold; }
    .num { text-align: right; white-space: nowrap; }
    
    #loading { display: none; font-weight: bold; color: #1a73e8; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>

  <div class="report-panel">
    <h2>Store Outstanding Live Dashboard</h2>
    <div id="updateTimeText" class="last-updated">Initializing...</div>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">
    
    <div class="row" style="max-width: 600px;">
      <div style="flex: 2;" id="dropdownWrapper">
        <label for="storeDropdown">Select Store Name / Branch:</label>
        <select id="storeDropdown" onchange="loadStoreReport()">
          <option value="">-- Loading Stores... --</option>
        </select>
      </div>
      <div style="flex: 1;">
        <button id="downloadBtn" class="download-btn" onclick="downloadCSV()">Download Excel</button>
      </div>
    </div>
    
    <div id="loading">⚡ Loading...</div>
    <div id="reportContainer"></div>
  </div>

  <script>
    var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby4RdQzfpHy2DvEOnjFPEsGjSVEj98jVHqzuqQPGqvcDt1KvRQNejygdppcMUN6nwk9CQ/exec"; 
    var currentReportData = null;
    var allowedBranch = "";
    var selectedStoreGlobal = "";

    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      allowedBranch = urlParams.get('branch') || "";

      var cachedStores = localStorage.getItem('cached_store_names');
      if (cachedStores) {
        populateDropdown(JSON.parse(cachedStores));
      }

      if (allowedBranch) {
        document.getElementById("dropdownWrapper").style.display = "none";
        fetchReportData(allowedBranch);
      } else {
        fetchStoreNames();
      }
    };

    function jsonpRequest(url, callbackName) {
      var oldScript = document.getElementById('jsonp_script_' + callbackName);
      if (oldScript) oldScript.parentNode.removeChild(oldScript);
      
      var script = document.createElement('script');
      script.id = 'jsonp_script_' + callbackName;
      script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
      document.body.appendChild(script);
    }

    function fetchStoreNames() {
      jsonpRequest(`${APPS_SCRIPT_URL}?action=getStoreNames`, 'handleStoreNames');
    }

    function handleStoreNames(stores) {
      if(stores && !stores.error) {
        localStorage.setItem('cached_store_names', JSON.stringify(stores));
        populateDropdown(stores);
      }
    }

    function populateDropdown(stores) {
      var dropdown = document.getElementById("storeDropdown");
      var currentVal = dropdown.value;
      dropdown.innerHTML = '<option value="">-- Choose a Store --</option>';
      stores.forEach(store => {
        var op = document.createElement("option");
        op.value = store; op.text = store; dropdown.appendChild(op);
      });
      if(currentVal) dropdown.value = currentVal;
      document.getElementById("updateTimeText").innerText = "Ready";
    }

    function loadStoreReport() {
      var store = document.getElementById("storeDropdown").value;
      if(!store) {
        document.getElementById("reportContainer").innerHTML = "";
        document.getElementById("downloadBtn").style.display = "none";
        return;
      }
      fetchReportData(store);
    }

    function fetchReportData(store) {
      selectedStoreGlobal = store;
      var loading = document.getElementById("loading");
      var dlBtn = document.getElementById("downloadBtn");
      var existingTable = document.getElementById("reportTable");
      
      loading.style.display = "block";
      
      // Agar pehle se koi table screen par hai, to use instant BLUR class de do
      if(existingTable) {
        existingTable.classList.add("table-blur");
      }

      var cacheKey = 'cache_report_' + store.toUpperCase();
      var cachedReport = localStorage.getItem(cacheKey);
      
      // Agar cache data hai to pehle render karo (lekin user ne store badla hai isliye tab tak blur rahega jab tak naya response na aa jaye)
      if(cachedReport && !existingTable) {
        renderHTML(JSON.parse(cachedReport), store);
        var newTable = document.getElementById("reportTable");
        if(newTable) newTable.classList.add("table-blur");
      }

      jsonpRequest(`${APPS_SCRIPT_URL}?action=getReport&branch=${encodeURIComponent(store)}`, 'handleReportData');
    }

    function handleReportData(data) {
      var loading = document.getElementById("loading");
      loading.style.display = "none";
      if(data && !data.error) {
        var cacheKey = 'cache_report_' + selectedStoreGlobal.toUpperCase();
        localStorage.setItem(cacheKey, JSON.stringify(data));
        
        // Naya data aate hi render hoga aur blur class hat jayegi (Visibly Clear ho jayega)
        renderHTML(data, selectedStoreGlobal);
        var currentTable = document.getElementById("reportTable");
        if(currentTable) {
          currentTable.classList.remove("table-blur");
        }
      }
    }

    function renderHTML(data, store) {
      if(data.lastUpdated) {
        document.getElementById("updateTimeText").innerText = data.lastUpdated;
      }
      currentReportData = data;
      document.getElementById("downloadBtn").style.display = "inline-block"; 
      
      var html = `<table class="report-table" id="reportTable">`;
      html += `<tr class="header-row"><td colspan="2">STORE NAME-</td><td colspan="3">${store.toUpperCase()}</td></tr>`;
      
      html += `<tr><th>Debtor</th><th>Date</th><th>Invoice No.</th><th>Invoice Value</th><th>Actual OS Amt.</th></tr>`;
      var dInvTotal = 0, dOsTotal = 0;
      data.debtor.forEach(r => {
        dInvTotal += Number(r[3]) || 0; dOsTotal += Number(r[4]) || 0;
        html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="num">${r[3]}</td><td class="num">${r[4]}</td></tr>`;
      });
      html += `<tr class="grand-total"><td colspan="3" style="text-align:center">GRAND TOTAL</td><td class="num">${dInvTotal}</td><td class="num ${data.debtor.length ? 'blue-total':''}">${dOsTotal}</td></tr>`;
      
      html += `<tr><td colspan="5" class="section-title">FINANCE OUTSTANDING REPORT</td></tr>`;
      html += `<tr><th>Financier</th><th>Date</th><th>Invoice No.</th><th>Invoice Value</th><th>Actual OS Amt.</th></tr>`;
      var fInvTotal = 0, fOsTotal = 0;
      data.finance.forEach(r => {
        fInvTotal += Number(r[3]) || 0; fOsTotal += Number(r[4]) || 0;
        html += `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="num">${r[3]}</td><td class="num">${r[4]}</td></tr>`;
      });
      html += `<tr class="grand-total"><td colspan="3" style="text-align:center">GRAND TOTAL</td><td class="num">${fInvTotal}</td><td class="num ${data.finance.length ? 'blue-total':''}">${fOsTotal}</td></tr>`;
      
      var grandFinalTotal = dOsTotal + fOsTotal + data.cash;
      html += `<tr><td colspan="5" class="highlight-title">OUTSTANDING</td></tr>`;
      html += `<tr><td colspan="3" style="font-weight:bold;">CUSTOMER</td><td colspan="2" class="num" style="font-weight:bold">${dOsTotal}</td></tr>`;
      html += `<tr><td colspan="3" style="font-weight:bold;">FINANCE</td><td colspan="2" class="num" style="font-weight:bold">${fOsTotal}</td></tr>`;
      html += `<tr><td colspan="3" style="font-weight:bold;">CASH BALANCE</td><td colspan="2" class="num purple-cell">${data.cash}</td></tr>`;
      html += `<tr><td colspan="3" style="font-weight:bold">TOTAL</td><td colspan="2" class="num yellow-cell">${grandFinalTotal}</td></tr>`;
      
      html += `</table>`;
      document.getElementById("reportContainer").innerHTML = html;
    }

    function downloadCSV() {
      var store = allowedBranch || document.getElementById("storeDropdown").value;
      if (!store || !currentReportData) return;
      
      var data = currentReportData;
      var csvRows = [];
      csvRows.push(`"STORE NAME-","${store.toUpperCase()}","","",""`);
      csvRows.push(""); 
      csvRows.push(`"Debtor","Date","Invoice No.","Invoice Value","Actual OS Amt."`);
      var dInvTotal = 0, dOsTotal = 0;
      data.debtor.forEach(r => {
        dInvTotal += Number(r[3]) || 0; dOsTotal += Number(r[4]) || 0;
        csvRows.push(`"${r[0]}","${r[1]}","${r[2]}",${r[3]},${r[4]}`);
      });
      csvRows.push(`"GRAND TOTAL","","",${dInvTotal},${dOsTotal}`);
      csvRows.push(""); 
      csvRows.push(`"FINANCE OUTSTANDING REPORT","","","",""`);
      csvRows.push(`"Financier","Date","Invoice No.","Invoice Value","Actual OS Amt."`);
      var fInvTotal = 0, fOsTotal = 0;
      data.finance.forEach(r => {
        fInvTotal += Number(r[3]) || 0; fOsTotal += Number(r[4]) || 0;
        csvRows.push(`"${r[0]}","${r[1]}","${r[2]}",${r[3]},${r[4]}`);
      });
      csvRows.push(`"GRAND TOTAL","","",${fInvTotal},${fOsTotal}`);
      csvRows.push(""); 
      var grandFinalTotal = dOsTotal + fOsTotal + data.cash;
      csvRows.push(`"OUTSTANDING","","","",""`);
      csvRows.push(`"CUSTOMER","","",,${dOsTotal}`);
      csvRows.push(`"FINANCE","","",,${fOsTotal}`);
      csvRows.push(`"CASH BALANCE","","",,${data.cash}`);
      csvRows.push(`"TOTAL","","",,${grandFinalTotal}`);
      
      var csvContent = "\ufeff" + csvRows.join("\n"); 
      var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", store.toUpperCase() + "_Outstanding_Report.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
